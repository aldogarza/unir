<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Blog de Aldo Garza Ramírez</title>
  <!-- Estilos generales a todo el sitio + estilos propios del login -->
  <link rel="stylesheet" href="css/estilos-generales.css">
  <link rel="stylesheet" href="css/estilos-login.css">
</head>

<body>

  <!-- Barra de navegación superior (navbar) -->
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
      </ul>
    </nav>
  </header>

  <!-- Barra con la información del autor (buttonbar) -->
  <section class="barra-autor">
    <p class="nombre-autor">Aldo Garza Ramírez</p>
    <div class="botones-autor">
      <a href="login.html" class="boton" id="boton-sesion">Iniciar sesión</a>
      <a href="nuevo-post.html" class="boton">Nuevo post</a>
    </div>
  </section>

  <!-- Contenido principal: formulario de inicio de sesión -->
  <main>
    <section class="formulario">
      <h1>Iniciar sesión</h1>
      <!-- El envío del formulario lo gestiona login.js (acepta cualquier dato) -->
      <form>
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario">

        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena">

        <button type="submit" class="boton">Entrar</button>
      </form>
    </section>
  </main>

  <!-- Pie de página -->
  <footer>
    <p>&copy; 2026 Aldo Garza Ramírez — Blog personal</p>
  </footer>

  <!-- Scripts: primero el de sesión y luego el del formulario de login -->
  <script src="js/sesion.js"></script>
  <script src="js/login.js"></script>

</body>

</html>
